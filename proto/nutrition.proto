syntax = "proto3";
package nutrition;

service NutritionService {
    rpc GetNutrition (NutritionRequest) returns (NutritionInfo);  // Unary
    rpc AddNutrition (AddNutritionRequest) returns (AddNutritionResponse); // Unary
    rpc GetDailySummary (DailySummaryRequest) returns (DailySummary); // Unary
    rpc StreamDailyProgress (ProgressRequest) returns (stream ProgressUpdate); // Server Streaming
    rpc AddUserCalories (AddUserCaloriesRequest) returns (AddUserCaloriesResponse); // Unary
}

message NutritionRequest { string menu_id = 1; }
message AddNutritionRequest {
    string menu_id = 1;
    string menu_name = 2;
    double calories = 3;
    double protein = 4;
    double carbs = 5;
    double fat = 6;
}
message AddNutritionResponse {
    bool success = 1;
    string message = 2;
}
message NutritionInfo { 
    string menu_id = 1;
    string menu_name  = 2;
    double calories = 3;
    double protein = 4;
    double carbs = 5;
    double fat = 6;
}
message DailySummaryRequest {
    string user_id = 1;
    string date = 2;
}
message DailySummary {
    string user_id = 1;
    double total_calories = 2;
    double calorie_limit = 3;
    bool is_over_limit = 4;
}
message ProgressRequest {
    string user_id = 1;
}
message ProgressUpdate {
    double current_calories = 1;
    double calorie_limit = 2;
    double percentage = 3;
    string warning_message = 4;
}
message AddUserCaloriesRequest {
    string user_id = 1;
    string menu_id = 2;
}
message AddUserCaloriesResponse {
    bool success = 1;
    string message = 2;
    double total_calories = 3;
}